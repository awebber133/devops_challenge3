- name: Configure web server
  hosts: web
  become: true

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: true

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: true

    - name: Deploy Hello World page
      copy:
        dest: /var/www/html/index.html
        content: |
          <h1>Hello, World!</h1>
          <p>Provisioned with Terraform and configured with Ansible.</p>